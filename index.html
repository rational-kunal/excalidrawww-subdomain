<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Excalidrawww Subdomain</title>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: #121212; /* Dark theme to match excalidraw dark mode typically */
            }
            iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
            }
        </style>
    </head>
    <body>
        <iframe
            src="https://excalidraw.com"
            title="Excalidraw"
            allow="
                clipboard-read;
                clipboard-write;
                display-capture;
                fullscreen;
                accelerometer;
                autoplay;
                camera;
                geolocation;
                microphone;
                midi;
                magnetometer;
                gyroscope;
                picture-in-picture;
            "
        ></iframe>
    </body>
</html>
